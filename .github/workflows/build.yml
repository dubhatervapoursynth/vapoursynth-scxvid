name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-non-windows-wheel:
    strategy:
      matrix:
        include:
        - arch: linux_x86_64
          runs-on: ubuntu-latest
        - arch: linux_aarch64
          runs-on: ubuntu-24.04-arm
        - arch: macosx_x86_64
          runs-on: macos-15-intel
        - arch: macosx_arm64
          runs-on: macos-15
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - uses: pypa/cibuildwheel@v3.4.0
      env:
        CIBW_BUILD: cp314-*
        CIBW_SKIP: cp314-musllinux*
        CIBW_CONFIG_SETTINGS: setup-args="-Db_lto=true"
        CIBW_ENVIRONMENT_MACOS: > 
          CPATH="$(brew --prefix)/include:$CPATH"
          LIBRARY_PATH="$(brew --prefix)/lib:$LIBRARY_PATH"
        CIBW_BEFORE_ALL_LINUX: >
          dnf -y install xvidcore-devel
        CIBW_BEFORE_ALL_MACOS: >
          brew install xvid
      with:
        output-dir: dist

    - name: Fix tag
      run: |
        cd dist
        for whl in *.whl; do
          pipx run wheel tags --remove --python-tag py3 --abi-tag none $whl
        done

    - uses: actions/upload-artifact@v7
      with:
        name: scxvid-${{ matrix.arch }}
        path: dist

  build-windows-wheel:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          mingw-w64-clang-x86_64-git
          mingw-w64-clang-x86_64-meson
          mingw-w64-clang-x86_64-python-build
          mingw-w64-clang-x86_64-python-wheel
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-xvidcore

    - name: Build
      run: |
        python -m build -Csetup-args="-Dprefer_static=true" -Csetup-args="-Db_lto=true" -Csetup-args="-Dcpp_link_args=-static"

    - name: Fix tag
      run: |
        cd dist
        for whl in *.whl; do
          wheel tags --remove --python-tag py3 --abi-tag none --platform-tag win_amd64 $whl
        done

    - uses: actions/upload-artifact@v7
      with:
        name: scxvid-sdist
        path: dist/*.tar.gz

    - uses: actions/upload-artifact@v7
      with:
        name: scxvid-win_amd64
        path: dist/*.whl

  publish:
    permissions:
      id-token: write
    needs: [build-non-windows-wheel, build-windows-wheel]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
